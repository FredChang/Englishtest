<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="description" content="中英翻譯單字練習 — 支援手機與電腦瀏覽器" />
  <title>英文單字練習</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div id="loading" class="loading-overlay">載入題庫中…</div>

  <div class="app">
    <!-- 設定畫面 -->
    <section id="screen-setup" class="hidden">
      <header class="header">
        <h1>中英翻譯練習</h1>
      </header>
      <p style="color:#64748b;margin:0 0 20px;font-size:0.95rem">請選擇測驗模式、方向、難度與題數</p>

      <div class="card">
        <label class="field-label">測驗模式</label>
        <div class="toggle-row">
          <label>
            <input type="radio" name="mode" value="typing" checked />
            <span class="toggle-card">✏️ 輸入作答</span>
          </label>
          <label>
            <input type="radio" name="mode" value="choice" />
            <span class="toggle-card">🔘 選擇題</span>
          </label>
        </div>

        <label class="field-label">翻譯方向</label>
        <div class="toggle-row">
          <label>
            <input type="radio" name="direction" value="ctoE" checked />
            <span class="toggle-card">中 → 英</span>
          </label>
          <label>
            <input type="radio" name="direction" value="EtoC" />
            <span class="toggle-card">英 → 中</span>
          </label>
        </div>

        <label class="field-label" for="level-select">難度（CEFR）</label>
        <select id="level-select"></select>
        <p id="level-pool-text" class="pool-text"></p>

        <label class="field-label" style="margin-top:16px">挑戰單字數量（最多 30 題）</label>
        <div class="slider-row">
          <input type="range" id="question-slider" min="1" max="30" value="10" step="1" />
          <span id="question-count-text">10 題</span>
        </div>
      </div>

      <button type="button" id="guide-open-btn" class="btn-guide" style="width:100%;margin-bottom:12px">
        開啟導讀練習
      </button>

      <div class="btn-row">
        <button type="button" class="btn-secondary" disabled style="opacity:0.5">—</button>
        <button type="button" id="start-btn" class="btn-primary">開始挑戰</button>
      </div>

      <p class="install-hint">
        iPhone：Safari 分享 →「加入主畫面」<br />
        Android：Chrome 選單 →「安裝應用程式」或「加到主畫面」
      </p>
    </section>

    <!-- 導讀：載入文稿 -->
    <section id="screen-guide-load" class="hidden">
      <header class="header">
        <h1>導讀練習</h1>
      </header>
      <p class="guide-intro">可貼上文字、選擇本機 .txt / .srt，或使用上次儲存的文稿（僅存於此裝置瀏覽器）。</p>

      <div class="card">
        <button type="button" id="guide-use-last-btn" class="btn-primary" style="width:100%;margin-bottom:8px" disabled>
          使用上次文稿
        </button>
        <p id="guide-last-hint" class="pool-text" style="margin:0 0 16px"></p>

        <div class="guide-gen-row">
          <div>
            <label class="field-label" for="guide-gen-level">隨機文章難度</label>
            <select id="guide-gen-level">
              <option value="A1">A1</option>
              <option value="A2">A2</option>
              <option value="B1" selected>B1</option>
              <option value="B2">B2</option>
              <option value="C1">C1</option>
              <option value="C2">C2</option>
            </select>
          </div>
          <div>
            <label class="field-label" for="guide-gen-count">句數</label>
            <input type="number" id="guide-gen-count" min="5" max="120" step="1" value="20" />
          </div>
        </div>
        <button type="button" id="guide-gen-btn" class="btn-guide" style="width:100%;margin:10px 0 16px">
          隨機產生文章並開始導讀
        </button>

        <input type="file" id="guide-file-input" class="hidden" accept=".txt,.srt,text/plain,application/x-subrip" />
        <button type="button" id="guide-pick-file-btn" class="btn-secondary" style="width:100%;margin-bottom:16px">
          選擇 .txt 或 .srt 檔案
        </button>

        <label class="field-label" for="guide-paste-area">貼上導讀內容</label>
        <textarea id="guide-paste-area" class="guide-paste" rows="6" placeholder="貼上英文文稿或 SRT 字幕…"></textarea>
        <button type="button" id="guide-paste-apply-btn" class="btn-primary" style="width:100%;margin-top:12px">
          使用貼上的內容
        </button>
      </div>

      <div class="guide-load-actions">
        <button type="button" id="guide-clear-saved-btn" class="btn-ghost">清除本機文稿</button>
        <button type="button" id="guide-load-back-btn" class="btn-secondary">返回</button>
      </div>
    </section>

    <!-- 導讀：播放 -->
    <section id="screen-guide-play" class="hidden">
      <header class="header">
        <h1>導讀練習</h1>
        <button type="button" id="guide-change-source-btn" class="btn-ghost">更換文稿</button>
      </header>

      <p id="guide-source-text" class="pool-text" style="margin:0 0 12px"></p>

      <div class="card guide-controls-card">
        <label class="field-label" style="margin-top:0">聲音</label>
        <select id="guide-voice-gender" style="margin-bottom:12px">
          <option value="female" selected>女音</option>
          <option value="male">男音</option>
        </select>
        <div class="slider-row">
          <span class="field-label" style="margin:0;min-width:6.5em">速度倍率</span>
          <input type="range" id="guide-speed-slider" min="0.5" max="1.5" value="1" step="0.1" />
          <span id="guide-speed-label">1.0x</span>
        </div>
        <p id="guide-progress-text" class="pool-text" style="margin:12px 0 0"></p>
      </div>

      <div class="card guide-list-card">
        <ul id="guide-segment-list" class="guide-segment-list"></ul>
      </div>

      <div class="guide-play-actions">
        <button type="button" id="guide-play-btn" class="btn-primary">開始朗讀</button>
        <button type="button" id="guide-pause-btn" class="btn-secondary" disabled>暫停</button>
        <button type="button" id="guide-stop-btn" class="btn-secondary" disabled>停止</button>
        <button type="button" id="guide-play-back-btn" class="btn-secondary">返回</button>
      </div>
    </section>

    <!-- 測驗畫面 -->
    <section id="screen-quiz" class="hidden">
      <header class="header">
        <h1 id="quiz-title">中英翻譯練習</h1>
        <span id="score-text" class="score">得分：0 / 0</span>
      </header>

      <div class="session-row">
        <span id="session-info"></span>
        <button type="button" id="restart-btn" class="btn-ghost">重新選擇</button>
      </div>

      <div class="card">
        <div class="question-box">
          <div id="question-text" class="word">載入中…</div>
        </div>

        <div class="phonetic-area">
          <div id="phonetic-placeholder" class="phonetic-placeholder">
            （點擊「播放發音」查看音標；有詞源資料時顯示字根）
          </div>
          <div id="phonetic-text" class="phonetic-text hidden"></div>
        </div>

        <div id="roots-section" class="roots-section hidden">
          <div id="roots-wrap" class="roots-wrap"></div>
          <p id="root-hint" class="root-hint"></p>
        </div>

        <p id="prompt-label" class="prompt">請輸入翻譯：</p>

        <div id="typing-panel">
          <input id="answer-input" class="answer-input" type="text" autocomplete="off" autocapitalize="off" enterkeyhint="done" placeholder="輸入答案…" />
          <div class="action-row">
            <button type="button" id="play-btn" class="btn-secondary">播放發音</button>
            <button type="button" id="dict-btn" class="btn-secondary" disabled>劍橋字典</button>
            <button type="button" id="submit-btn" class="btn-primary">送出答案</button>
          </div>
        </div>

        <div id="choice-panel" class="hidden">
          <div class="option-grid">
            <button type="button" class="option-btn" data-index="0">A</button>
            <button type="button" class="option-btn" data-index="1">B</button>
            <button type="button" class="option-btn" data-index="2">C</button>
            <button type="button" class="option-btn" data-index="3">D</button>
          </div>
        </div>

        <div id="feedback-panel" class="feedback hidden">
          <span id="feedback-text"></span>
        </div>

        <button type="button" id="next-btn" class="btn-primary" style="width:100%" disabled>下一題</button>
      </div>
    </section>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
